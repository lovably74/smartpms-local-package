# wbs.smartpms.net:5443 (HTTPS), :5080 (HTTP) -> Node (127.0.0.1:8090)
# 인증서: scripts/deploy/generate-selfsigned-ssl.sh 또는 /etc/nginx/ssl/

server {
    listen 5443 ssl http2;
    server_name wbs.smartpms.net;

    ssl_certificate     /etc/nginx/ssl/wbs.smartpms.net.crt;
    ssl_certificate_key /etc/nginx/ssl/wbs.smartpms.net.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 5080;
    server_name wbs.smartpms.net;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
